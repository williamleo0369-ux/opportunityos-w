services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opportunity_os
      POSTGRES_USER: opportunity
      POSTGRES_PASSWORD: opportunity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
